name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: lint + build (ubuntu / node-22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: chmod +x dist/index.js
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: test ${{ matrix.os }} / node-${{ matrix.node }}
    needs: lint-and-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ["22.x", "24.x"]
        os: [macos-latest, ubuntu-latest]
        # Windows omitted in W1: symlink test fixtures need admin/dev mode
        # and `O_NOFOLLOW` is silently dropped by libuv on win32.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: chmod +x dist/index.js
      - run: npm test
