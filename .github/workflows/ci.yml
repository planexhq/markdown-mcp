name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: lint + build (ubuntu / node-22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: chmod +x dist/index.js
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: test ${{ matrix.os }} / node-${{ matrix.node }}
    needs: lint-and-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ["22.x", "24.x"]
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Restore the exec bit lost in the artifact round-trip. The Windows
      # runner doesn't need it (test spawns invoke `node dist/index.js`
      # via `process.execPath`, never the shebang).
      - if: runner.os != 'Windows'
        run: chmod +x dist/index.js
      # Invoke vitest directly so npm's `pretest: npm run build` doesn't
      # overwrite the artifact we just downloaded. The matrix exists to
      # validate the uploaded dist/ round-trip — `npm test` here would
      # silently rebuild from local sources and defeat that.
      - run: npx vitest run
